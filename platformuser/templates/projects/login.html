<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Auth</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1f2b, #0d0f14);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.auth-container{
    width:400px;
    background: rgba(20,25,35,0.95);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#1c2230;
    color:white;
    transition:0.2s;
}

input:focus{
    outline:none;
    background:#222a3a;
    box-shadow:0 0 0 2px #1abc9c;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1abc9c,#16a085);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(26,188,156,0.3);
}

.switch{
    text-align:center;
    margin-top:15px;
    color:#aaa;
    cursor:pointer;
}

.switch:hover{
    color:white;
}

.hidden{
    display:none;
}

.error{
    background:#ff4d4d;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="auth-container">

<div id="loginForm">
<h2>Вхід</h2>

{% if login_error %}
<div class="error">{{ login_error }}</div>
{% endif %}

<form method="POST">
{% csrf_token %}
<input type="text" name="login" placeholder="Email або Username">
<input type="password" name="password" placeholder="Пароль">
<button type="submit" name="login_submit">Увійти</button>
</form>

<div class="switch" onclick="showRegister()">Немає акаунту?</div>
</div>

<div id="registerForm" class="hidden">
<h2>Реєстрація</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}
<input type="text" name="username" placeholder="Username">
<input type="email" name="email" placeholder="Email">
<input type="file" name="avatar">
<input type="password" name="password1" placeholder="Пароль">
<input type="password" name="password2" placeholder="Повторіть пароль">
<button type="submit" name="register_submit">Створити акаунт</button>
</form>

<div class="switch" onclick="showLogin()">Вже є акаунт?</div>
</div>

</div>

<script>
function showRegister(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}
function showLogin(){
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}
</script>

</body>
</html>
