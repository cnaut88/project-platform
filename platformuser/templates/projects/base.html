<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f1115;
    color: #e6e6e6;
}

.container {
    width: 1100px;
    margin: auto;
}
.navbar {
    background: #151821;
    padding: 15px 0;
    border-bottom: 1px solid #1f2430;
}

.navbar a {
    color: #aaa;
    text-decoration: none;
    margin-right: 20px;
    transition: 0.2s;
}

.navbar a:hover {
    color: #1abc9c;
}

.project-card {
    background: #181c25;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    transition: 0.25s;
    border: 1px solid #1f2430;
}

.project-card:hover {
    transform: translateY(-4px);
    border-color: #1abc9c;
}

.project-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
}

.project-author {
    font-size: 13px;
    color: #888;
    margin-bottom: 15px;
}

.project-actions {
    display: flex;
    gap: 15px;
}

.btn {
    background: #1abc9c;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #16a085;
}
.project-image img {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 15px;
}
header {
    background-color: #384343;
    padding: 15px 30px;
}

.nav-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.projects-nav {
    display: flex;
    list-style: none; 
    margin: 0;
    padding: 0 10px;
    gap: 5px;
}

.toggle-btn {
    display: inline-block;
    padding: 15px 20px;
    color: #b0b0b0;        
    text-decoration: none;
    font-family: sans-serif;
    font-size: 15px;
    position: relative;     
    transition: color 0.3s ease;
}

.toggle-btn:hover {
    color: #ffffff;
}

.toggle-btn::after {
    content: "";
    position: absolute;
    bottom: 0;              
    left: 0;
    width: 100%;
    height: 3px;            
    background-color: #fff; 
    transform: scaleX(0);   
    transition: transform 0.3s ease;
}

.toggle-btn.active {
    color: #ffffff;        
}

.toggle-btn.active::after {
    transform: scaleX(1);   
}

.user-menu {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
}

.auth-link {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 15px;
    transition: 0.3s;
}

.auth-link:hover {
    color: #1abc9c;
}


.avatar-wrapper {
    position: relative;
    cursor: pointer;
}

.avatar-img {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
}

.avatar-placeholder {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
}


.dropdown-menu {
    position: absolute;
    top: 50px;
    right: 0;
    background: #2f3a3a;
    border-radius: 8px;
    padding: 10px 0;
    width: 170px;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    animation: fadeIn 0.2s ease;
}

.dropdown-menu.show {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

.dropdown-menu a {
    display: block;
    padding: 10px 15px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.dropdown-menu a:hover {
    background: #1abc9c;
}


</style>
</head>

<body>

<header>
    <div class="nav-wrapper">
        <div style="display: flex; align-items: center; gap: 30px;">
            <a href="/" style="color:white; text-decoration:none; font-weight:bold; font-size: 20px;">LOGO</a>
            
            <ul class="projects-nav">
                <li>
                    <a class="toggle-btn {% if request.resolver_match.url_name == 'show_projects' %}active{% endif %}" 
                        href="{% url 'show_projects' %}">Всі проекти</a>
                </li>
                <li>
                    <a class="toggle-btn {% if request.resolver_match.url_name == 'create_project' %}active{% endif %}" 
                        href="{% url 'create_project' %}">Створити</a>
                </li>
                <li>
                    <a class="toggle-btn {% if request.resolver_match.url_name == 'my_projects' %}active{% endif %}" 
                        href="{% url 'my_projects' %}">Мої проекти</a>
                </li>
            </ul>
        </div>

        <div class="user-menu">
    {% if request.user.is_authenticated %}

        <div class="avatar-wrapper" id="avatarWrapper">

    {% if request.user.avatar %}
        <img src="{{ request.user.avatar.url }}" class="avatar-img">
    {% else %}
        <div class="avatar-placeholder">
            {{ request.user.username|first|upper }}
        </div>
    {% endif %}

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="{% url 'profile' %}">{{ request.user.username }}</a>
        <a href="{% url 'my_projects' %}">Мої проекти</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

</div>

    {% else %}
        <a href="{% url 'auth' %}" class="auth-link">Login</a>
    {% endif %}
</div>
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const avatar = document.getElementById("avatarWrapper");
    const menu = document.getElementById("dropdownMenu");

    avatar.addEventListener("click", function (e) {
        e.stopPropagation();
        menu.classList.toggle("show");
    });

    document.addEventListener("click", function () {
        menu.classList.remove("show");
    });

});
</script>
</body>
</html>
