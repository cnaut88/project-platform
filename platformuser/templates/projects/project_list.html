{% extends "projects/base.html" %}
{% block content %}

<style>

.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.project-card {
    background: #181818;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.25s ease;
    cursor: pointer;
}

.project-card:hover {
    transform: translateY(-6px);
}

.project-thumbnail {
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: #2a2a2a;
}

.project-content {
    padding: 15px;
}

.project-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: white;
}

.project-meta {
    font-size: 13px;
    color: #aaa;
}

.status-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 8px;
    font-size: 11px;
    border-radius: 6px;
    background: #272727;
    color: #1abc9c;
}

</style>

<h2>Всі проекти</h2>

<div class="projects-grid">

{% for project in projects %}
<a href="{% url 'project_details' project.id %}" style="text-decoration:none;">

    <div class="project-card">

        {% if project.image %}
            <img src="{{ project.image.url }}" class="project-thumbnail">
        {% else %}
            <div class="project-thumbnail"></div>
        {% endif %}

        <div class="project-content">
            <div class="project-title">{{ project.title }}</div>
            <div class="project-meta">
                {{ project.owner.username }} • {{ project.created_a }}
            </div>

            <div class="status-badge">
                {{ project.get_status_display }}
            </div>
        </div>

    </div>

</a>
{% endfor %}

</div>

{% endblock %}
