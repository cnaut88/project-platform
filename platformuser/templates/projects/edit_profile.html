{% extends "projects/base.html" %}
{% block content %}

<style>
    :root {
        --bg-dark: #0f0f0f;
        --card-bg: #1f1f1f;
        --accent-blue: #3ea6ff;
        --accent-hover: #65b8ff;
        --text-main: #f1f1f1;
        --text-dim: #aaaaaa;
        --border-color: #3f3f3f;
        --error-red: #ff4e4e;
    }

    body {
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: 'Inter', -apple-system, sans-serif;
    }

    .edit-container {
        max-width: 500px;
        margin: 60px auto;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .edit-container h2 {
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        letter-spacing: -0.5px;
    }

    .edit-container label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dim);
    }

    
    .edit-container input[type="text"],
    .edit-container input[type="email"],
    .edit-container textarea,
    .edit-container input[type="file"] {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 25px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: white;
        font-size: 15px;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .edit-container input:focus,
    .edit-container textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(62, 166, 255, 0.1);
    }

    
    .edit-container input[type="file"] {
        padding: 10px;
        font-size: 13px;
        cursor: pointer;
    }

    
    .form-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
    }

    .save-btn {
        padding: 12px 28px;
        background: var(--accent-blue);
        color: #0f0f0f;
        border: none;
        border-radius: 25px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }

    .save-btn:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
    }

    .save-btn:active {
        transform: translateY(0);
    }

    .cancel-btn {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
    }

    .cancel-btn:hover {
        color: var(--text-main);
    }

    
    .errorlist {
        list-style: none;
        padding: 0;
        color: var(--error-red);
        font-size: 13px;
        margin-bottom: 15px;
    }
</style>

<div class="edit-container">
    <h2>Налаштування профілю</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Ім'я користувача</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label for="{{ form.email.id_for_label }}">Електронна пошта</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label for="{{ form.bio.id_for_label }}">Про себе (Bio)</label>
            {{ form.bio }}
        </div>

        <div class="form-group">
            <label for="{{ form.avatar.id_for_label }}">Фото профілю</label>
            {{ form.avatar }}
        </div>

        <div class="form-actions">
            <button type="submit" class="save-btn">Зберегти зміни</button>
            <a href="{% url 'profile' %}" class="cancel-btn">Скасувати</a>
        </div>
    </form>
</div>

{% endblock %}
